<!DOCTYPE html>
<html>
<head>
<title>Leads Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Leads Dashboard</h1>
<h3 id="count"></h3>
<input type="text" id="search" placeholder="Search leads...">

<table border="1">

<thead>
<tr>
<th>Name</th>
<th>Email</th>
<th>Source</th>
<th>Status</th>
<th>Notes</th>
<th>Action</th>
</tr>
</thead>

<tbody id="leadTable"></tbody>


</table>

<br>

<a href="index.html">Add New Lead</a>

<script>

fetch("/getLeads")
.then(response => response.json())
.then(data => {
document.getElementById("count").innerText = "Total Leads: " + data.length;

let rows = "";

data.forEach(function(lead){

rows += `
<tr>
<td>${lead.name}</td>
<td>${lead.email}</td>
<td>${lead.source}</td>
<td>
<select onchange="updateStatus('${lead._id}', this.value)">
<option ${lead.status=='New'?'selected':''}>New</option>
<option ${lead.status=='Contacted'?'selected':''}>Contacted</option>
<option ${lead.status=='Converted'?'selected':''}>Converted</option>
</select>
</td>
<td>${lead.notes}</td>
<td>
<a class="delete-btn" href="/deleteLead/${lead._id}">Delete</a>
</td>
</tr>
`;

});

document.getElementById("leadTable").innerHTML = rows;

});
document.getElementById("search").addEventListener("keyup", function(){

let value = this.value.toLowerCase();

let rows = document.querySelectorAll("#leadTable tr");

rows.forEach(function(row){

row.style.display =
row.innerText.toLowerCase().includes(value) ? "" : "none";

});

});
function updateStatus(id,status){

fetch(`/updateStatus/${id}/${status}`)
.then(()=>location.reload())

}

</script>

</body>
</html>
